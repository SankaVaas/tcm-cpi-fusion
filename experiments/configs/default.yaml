project: tcm-cpi-fusion
seed: 42
device: cuda      # override to 'cpu' for local runs

data:
  tcmsp_dir:       data/raw/tcmsp
  bindingdb_path:  data/raw/bindingdb/BindingDB_All_2D_v2.tsv
  processed_dir:   data/processed
  adme_ob:  30.0
  adme_dl:  0.18
  test_size: 0.10
  val_size:  0.10

model:
  gcn_out:  256
  prot_out: 256
  bert_dim: 768
  dropout:  0.3

training:
  epochs:       50
  batch_size:   32
  lr:           2.0e-4
  weight_decay: 1.0e-5
  scheduler:    cosine
  pos_weight:   5.0

evaluation:
  threshold:    0.5
  ef_fraction:  0.01

docking:
  exhaustiveness: 8
  box_size: [20, 20, 20]
